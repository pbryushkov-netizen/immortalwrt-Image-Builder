name: Build Custom OpenWrt 24.10.5 with Micro VLESS GUI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build custom minimal Sing-box and compress with UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl zstd
          
          git clone https://github.com/SagerNet/sing-box.git
          cd sing-box
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm64
          go build -v -trimpath -ldflags "-s -w -buildid=" \
            -tags "with_vless,with_utls,with_reality" \
            -o ../sing-box-custom ./cmd/sing-box
          cd ..
          
          upx --best --lzma sing-box-custom

      - name: Setup Vanilla OpenWrt 24.10.5 ImageBuilder
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-imagebuilder-24.10.5-mediatek-filogic.Linux-x86_64.tar.zst
          tar -xf openwrt-imagebuilder-*.tar.zst
          mv openwrt-imagebuilder-*/ builder

      - name: Patch SquashFS compression in .config
        run: |
          cd builder
          sed -i 's/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=1024/g' .config

      - name: Inject Micro LuCI GUI and Sing-box Engine
        run: |
          mkdir -p builder/files/usr/bin/
          mkdir -p builder/files/etc/config/
          mkdir -p builder/files/usr/lib/lua/luci/controller/
          mkdir -p builder/files/usr/lib/lua/luci/model/cbi/
          mkdir -p builder/files/etc/init.d/
          mkdir -p builder/files/etc/uci-defaults/
          
          cp sing-box-custom builder/files/usr/bin/sing-box
          chmod +x builder/files/usr/bin/sing-box

          # 1. Файл конфигурации интерфейса
          cat << 'EOF' > builder/files/etc/config/vless
          config server 'main'
              option enabled '0'
              option server ''
              option port '443'
              option uuid ''
              option sni ''
              option pbk ''
              option sid ''
          EOF

          # 2. Интеграция в меню веб-интерфейса LuCI
          cat << 'EOF' > builder/files/usr/lib/lua/luci/controller/vless.lua
          module("luci.controller.vless", package.seeall)
          function index()
              entry({"admin", "vpn"}, firstchild(), "VPN", 60)
              entry({"admin", "vpn", "vless"}, cbi("vless"), "VLESS Reality", 1)
          end
          EOF

          # 3. Визуальная форма ввода ключей
          cat << 'EOF' > builder/files/usr/lib/lua/luci/model/cbi/vless.lua
          m = Map("vless", "VLESS+xhttp Reality", "Ультра-компактный клиент Sing-Box. Базы маршрутизации загружаются в RAM автоматически.")
          s = m:section(NamedSection, "main", "server", "Настройки сервера")
          s.addremove = false
          s:option(Flag, "enabled", "Включить VPN")
          s:option(Value, "server", "IP Сервера / Домен")
          s:option(Value, "port", "Порт")
          s:option(Value, "uuid", "UUID")
          s:option(Value, "sni", "SNI (Server Name Indication)")
          s:option(Value, "pbk", "Public Key (pbk)")
          s:option(Value, "sid", "Short ID (sid)")
          return m
          EOF

          # 4. Системный демон маршрутизации и автозапуска
          cat << 'EOF' > builder/files/etc/init.d/vless
          #!/bin/sh /etc/rc.common
          START=99
          USE_PROCD=1

          start_service() {
              config_load vless
              config_get enabled main enabled '0'
              [ "$enabled" = "1" ] || return 0

              config_get server main server
              config_get port main port '443'
              config_get uuid main uuid
              config_get sni main sni
              config_get pbk main pbk
              config_get sid main sid

              mkdir -p /tmp/geo
              [ -f /tmp/geo/geoip-ru.srs ] || wget -qO /tmp/geo/geoip-ru.srs https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip-ru.srs
              [ -f /tmp/geo/geosite-ru.srs ] || wget -qO /tmp/geo/geosite-ru.srs https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite-ru.srs

              cat <<JSON > /tmp/sing-box.json
              {
                "log": {"level": "error"},
                "inbounds": [{"type": "tun", "tag": "tun-in", "interface_name": "tun0", "inet4_address": "172.19.0.1/30", "auto_route": true, "strict_route": true}],
                "outbounds": [
                  {
                    "type": "vless",
                    "tag": "vless-out",
                    "server": "$server",
                    "server_port": $port,
                    "uuid": "$uuid",
                    "flow": "xtls-rprx-vision",
                    "transport": {"type": "xhttp"},
                    "tls": {
                      "enabled": true,
                      "server_name": "$sni",
                      "utls": {"enabled": true, "fingerprint": "chrome"},
                      "reality": {"enabled": true, "public_key": "$pbk", "short_id": "$sid"}
                    },
                    "packet_encoding": "xudp"
                  },
                  {"type": "direct", "tag": "direct"}
                ],
                "route": {
                  "rule_set": [
                    {"tag": "geoip-ru", "type": "local", "format": "binary", "path": "/tmp/geo/geoip-ru.srs"},
                    {"tag": "geosite-ru", "type": "local", "format": "binary", "path": "/tmp/geo/geosite-ru.srs"}
                  ],
                  "rules": [
                    {"rule_set": ["geoip-ru", "geosite-ru"], "outbound": "direct"},
                    {"domain_suffix": [".ru", ".su"], "outbound": "direct"}
                  ],
                  "auto_detect_interface": true
                }
              }
          JSON

              procd_open_instance
              procd_set_param command /usr/bin/sing-box run -c /tmp/sing-box.json
              procd_set_param respawn
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance
          }
          EOF
          chmod +x builder/files/etc/init.d/vless

          # Скрипт активации демона после прошивки
          cat << 'EOF' > builder/files/etc/uci-defaults/99-enable-vless
          #!/bin/sh
          /etc/init.d/vless enable
          rm -f /etc/uci-defaults/99-enable-vless
          EOF
          chmod +x builder/files/etc/uci-defaults/99-enable-vless

      - name: Build Firmware with OpenWrt 24.10.5 baseline
        run: |
          cd builder
          # Исключение тяжелых модулей IPv6 и USB
          EXCLUDE_PKGS="-odhcp6c -kmod-ipv6 -luci-proto-ipv6 -kmod-usb-core -kmod-usb3 -ppp -ppp-mod-pppoe"
          
          # Установка базового веб-интерфейса, совместимости для Lua и сертификатов
          INCLUDE_PKGS="luci luci-base luci-compat luci-theme-bootstrap wpad-basic-mbedtls ca-bundle"
          
          make image PROFILE="cudy_wr3000-v1" PACKAGES="$INCLUDE_PKGS $EXCLUDE_PKGS" FILES="files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cudy-WR3000-v1-OpenWrt-24.10.5-MicroVLESS
          path: builder/bin/targets/mediatek/filogic/*-sysupgrade.bin
