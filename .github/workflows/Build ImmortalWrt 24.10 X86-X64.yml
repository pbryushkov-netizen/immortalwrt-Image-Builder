name: Build ImmortalWrt for Cudy WR3000 v1
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PROFILE: cudy_wr3000-v1
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  # МАКСИМАЛЬНО ЖЕСТКАЯ ЭКОНОМИЯ МЕСТА:
  # Убираем luci-app-sing-box, оставляем только сам бинарник
  # Вырезаем поддержку USB, звука и лишних протоколов Wi-Fi
  PACKAGES: "sing-box -luci-app-sing-box -kmod-usb-core -kmod-usb3 -kmod-usb-dwc3 -kmod-sound-core -wpad-basic-mbedtls wpad-mesh-wolfssl -kmod-nft-offload -kmod-tcp-bbr"
  DOWNLOAD_URL: https://downloads.immortalwrt.org/releases/24.10.5/targets/mediatek/filogic/immortalwrt-imagebuilder-24.10.5-mediatek-filogic.Linux-x86_64.tar.zst
  TZ: Europe/Moscow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 zstd

    - name: Download and extract Image Builder
      run: |
        # Скачиваем
        wget -qO /tmp/imagebuilder.tar.zst $DOWNLOAD_URL
        # Распаковываем через zstd явно
        zstd -d /tmp/imagebuilder.tar.zst -o /tmp/imagebuilder.tar
        sudo tar -xvf /tmp/imagebuilder.tar -C /tmp
        # Чистим временные архивы сразу
        rm /tmp/imagebuilder.tar /tmp/imagebuilder.tar.zst

    - name: Set Image Builder root directory
      run: |
        ROOT_DIR=$(find /tmp -maxdepth 1 -type d -name "immortalwrt-imagebuilder-*")
        echo "ROOT_DIRECTORY=$ROOT_DIR" >> $GITHUB_ENV

    - name: Compile firmware
      continue-on-error: true
      run: |
        cd ${{ env.ROOT_DIRECTORY }}
        # Пытаемся собрать. Если упадет по месту - мы увидим это в логе
        sudo make image PROFILE=${{ env.PROFILE }} PACKAGES="${{ env.PACKAGES }}" || { echo "BUILD_FAILED=true" >> $GITHUB_ENV; exit 1; }
        
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        sudo mkdir -p /tmp/bin_firmware
        cp bin/targets/mediatek/filogic/*.bin /tmp/bin_firmware/ || true
        cp bin/targets/mediatek/filogic/*.manifest /tmp/bin_firmware/ || true

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd /tmp/bin_firmware
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-Cudy-WR3000-v1-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=Cudy-WR3000-v1-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "Custom ImmortalWrt for Cudy WR3000 v1" > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
