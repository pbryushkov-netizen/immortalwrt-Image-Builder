name: Build OpenWrt for Cudy WR3000 v1
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PROFILE: cudy_wr3000-v1
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  # В чистом OpenWrt нам не нужно вырезать десятки пакетов. 
  # Добавляем VPN-клиенты и удаляем только драйверы USB для экономии места.
  PACKAGES: "luci-app-shadowsocks-libev shadowsocks-libev-ss-local shadowsocks-libev-ss-redir xray-plugin -kmod-usb-core -kmod-usb3 -kmod-usb-dwc3"
  DOWNLOAD_URL: https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-imagebuilder-23.05.5-mediatek-filogic.Linux-x86_64.tar.xz
  TZ: Europe/Moscow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

    - name: Download and extract Image Builder
      run: |
        wget -qO /tmp/imagebuilder.tar.xz $DOWNLOAD_URL
        sudo tar -xf /tmp/imagebuilder.tar.xz -C /tmp
        rm /tmp/imagebuilder.tar.xz

    - name: Set Image Builder root directory
      run: |
        ROOT_DIR=$(find /tmp -maxdepth 1 -type d -name "openwrt-imagebuilder-*")
        echo "ROOT_DIRECTORY=$ROOT_DIR" >> $GITHUB_ENV

    - name: Compile firmware
      run: |
        cd ${{ env.ROOT_DIRECTORY }}
        sudo make image PROFILE=${{ env.PROFILE }} PACKAGES="${{ env.PACKAGES }}"
        
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        sudo mkdir -p /tmp/bin_firmware
        sudo find bin/targets/ -type f -name "*.bin" -exec cp {} /tmp/bin_firmware/ \;
        sudo find bin/targets/ -type f -name "*.manifest" -exec cp {} /tmp/bin_firmware/ \;

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd /tmp/bin_firmware
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-Cudy-WR3000-v1-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=Cudy-WR3000-v1-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "Official OpenWrt with Shadowsocks-libev and Xray-plugin" > release.txt

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
