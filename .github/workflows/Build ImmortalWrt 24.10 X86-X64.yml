name: Build ImmortalWrt for Cudy WR3000 v1
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PROFILE: cudy_wr3000-v1
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  # Включаем sing-box и беспощадно вырезаем USB/звук для экономии места (важно для 16MB Flash)
  PACKAGES: "sing-box luci-app-sing-box -kmod-usb-core -kmod-usb3 -kmod-usb-dwc3 -kmod-sound-core -wpad-basic-mbedtls wpad-mesh-wolfssl"
  DOWNLOAD_URL: https://downloads.immortalwrt.org/releases/24.10.5/targets/mediatek/filogic/immortalwrt-imagebuilder-24.10.5-mediatek-filogic.Linux-x86_64.tar.zst
  TZ: Europe/Moscow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 zstd

    - name: Download and extract Image Builder
      run: |
        wget -O /tmp/imagebuilder.tar.zst $DOWNLOAD_URL
        sudo tar -C /tmp -xvf /tmp/imagebuilder.tar.zst

    - name: Set Image Builder root directory
      run: |
        # Автоматически находим папку распакованного ImageBuilder
        ROOT_DIR=$(find /tmp -maxdepth 1 -type d -name "immortalwrt-imagebuilder-*")
        echo "ROOT_DIRECTORY=$ROOT_DIR" >> $GITHUB_ENV

    - name: Compile firmware
      run: |
        cd $ROOT_DIRECTORY
        # Собираем образ с нашими пакетами
        sudo make image PROFILE="$PROFILE" PACKAGES="$PACKAGES"
        
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        # Собираем результаты в одну папку
        sudo mkdir -p /tmp/bin_firmware
        sudo find bin/targets/ -type f -name "*.bin" -exec sudo cp {} /tmp/bin_firmware/ \;
        sudo find bin/targets/ -type f -name "*.manifest" -exec sudo cp {} /tmp/bin_firmware/ \;

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd /tmp/bin_firmware
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-Cudy-WR3000-v1-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=Cudy-WR3000-v1-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "Custom ImmortalWrt for Cudy WR3000 v1 with Sing-Box (Reality/xhttp)" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
