name: Build Custom OpenWrt 24.10.6 with Micro VLESS GUI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build custom minimal Sing-box
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl zstd
          
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --recursive https://github.com/hiddify/hiddify-sing-box.git sing-box
          cd sing-box
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm64
          go build -v -trimpath -ldflags "-s -w -buildid=" \
            -tags "with_vless,with_utls,with_reality,with_xhttp" \
            -o ../sing-box-custom ./cmd/sing-box
          cd ..
          
          upx --best --lzma sing-box-custom

      - name: Upload VPN Core to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete vpn-core --cleanup-tag -y || true
          gh release create vpn-core sing-box-custom -t "VPN Core (RAM-based)" -n "Автоматическая сборка ядра для загрузки в оперативную память роутера"

      - name: Setup Vanilla OpenWrt 24.10.6 ImageBuilder
        run: |
          wget https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/openwrt-imagebuilder-24.10.6-mediatek-filogic.Linux-x86_64.tar.zst
          tar -xf openwrt-imagebuilder-*.tar.zst
          mv openwrt-imagebuilder-*/ builder

      - name: Patch SquashFS compression in .config
        run: |
          cd builder
          sed -i 's/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=1024/g' .config

      - name: Inject Micro LuCI GUI and RAM Loader
        run: |
          mkdir -p builder/files/usr/bin/
          mkdir -p builder/files/etc/config/
          mkdir -p builder/files/usr/lib/lua/luci/controller/
          mkdir -p builder/files/usr/lib/lua/luci/model/cbi/
          mkdir -p builder/files/etc/init.d/
          mkdir -p builder/files/etc/uci-defaults/

          cat << 'EOF' > builder/files/etc/config/vless
          config server 'main'
              option enabled '0'
              option server ''
              option port '443'
              option uuid ''
              option transport 'tcp'
              option sni ''
              option pbk ''
              option sid ''
          EOF

          cat << 'EOF' > builder/files/usr/lib/lua/luci/controller/vless.lua
          module("luci.controller.vless", package.seeall)
          function index()
              entry({"admin", "vpn"}, firstchild(), "VPN", 60)
              entry({"admin", "vpn", "vless"}, cbi("vless"), "VLESS Reality", 1)
          end
          EOF

          cat << 'EOF' > builder/files/usr/lib/lua/luci/model/cbi/vless.lua
          m = Map("vless", "VLESS+Reality", "Ультра-компактный клиент. Базы и ядро автоматически скачиваются в RAM.")
          
          m.on_after_commit = function(self)
              os.execute("/etc/init.d/vless restart >/dev/null 2>&1 &")
          end

          s = m:section(NamedSection, "main", "server", "Настройки сервера")
          s.addremove = false
          s:option(Flag, "enabled", "Включить VPN")
          s:option(Value, "server", "IP Сервера / Домен")
          s:option(Value, "port", "Порт")
          s:option(Value, "uuid", "UUID")
          
          t = s:option(ListValue, "transport", "Тип транспорта")
          t:value("tcp", "TCP + XTLS-Vision (Стандарт)")
          t:value("xhttp", "XHTTP (Split-HTTP)")
          t.default = "tcp"
          
          s:option(Value, "sni", "SNI (Server Name Indication)")
          s:option(Value, "pbk", "Public Key (pbk)")
          s:option(Value, "sid", "Short ID (sid)")
          return m
          EOF

          # Функция скачивания с ключом -k (insecure) для обхода проблем с датой и временем
          cat << 'EOF' > builder/files/usr/bin/vpn-runner.sh
          #!/bin/sh
          download() {
              FILE=$1
              URL=$2
              logger -t "VPN" "Downloading $FILE..."
              curl -sfLk -4 --connect-timeout 15 -o "$FILE" "$URL" || \
              curl -sfLk -4 --connect-timeout 15 -o "$FILE" "https://mirror.ghproxy.com/$URL" || \
              curl -sfLk -4 --connect-timeout 15 -o "$FILE" "https://ghp.ci/$URL"
          }

          if [ ! -x /tmp/sing-box ]; then
              logger -t "VPN" "Waiting for internet connection..."
              while ! ping -c 1 -W 1 8.8.8.8 >/dev/null 2>&1; do sleep 3; done
              logger -t "VPN" "Internet OK. Downloading core to RAM..."
              download "/tmp/sing-box" "https://github.com/GITHUB_REPO_PLACEHOLDER/releases/download/vpn-core/sing-box-custom"
              chmod +x /tmp/sing-box
          fi
          
          mkdir -p /tmp/geo
          [ -s /tmp/geo/geoip-ru.srs ] || download "/tmp/geo/geoip-ru.srs" "https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip-ru.srs"
          [ -s /tmp/geo/geosite-ru.srs ] || download "/tmp/geo/geosite-ru.srs" "https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite-ru.srs"
          
          if [ ! -s /tmp/geo/geoip-ru.srs ]; then
              logger -t "VPN" "Error: Failed to download GeoIP databases"
              rm -f /tmp/geo/geoip-ru.srs /tmp/geo/geosite-ru.srs
              sleep 10
              exit 1
          fi
          
          logger -t "VPN" "Starting tunnel..."
          exec /tmp/sing-box run -c /tmp/sing-box.json
          EOF
          
          sed -i "s|GITHUB_REPO_PLACEHOLDER|${{ github.repository }}|g" builder/files/usr/bin/vpn-runner.sh
          chmod +x builder/files/usr/bin/vpn-runner.sh

          cat << 'EOF' > builder/files/etc/init.d/vless
          #!/bin/sh /etc/rc.common
          START=99
          USE_PROCD=1

          start_service() {
              config_load vless
              config_get enabled main enabled '0'
              [ "$enabled" = "1" ] || return 0

              config_get server main server
              config_get port main port '443'
              config_get uuid main uuid
              config_get transport main transport 'tcp'
              config_get sni main sni
              config_get pbk main pbk
              config_get sid main sid

              if [ "$transport" = "xhttp" ]; then
                  FLOW_BLOCK=''
                  TRANS_BLOCK='"transport": {"type": "xhttp"},'
              else
                  FLOW_BLOCK='"flow": "xtls-rprx-vision",'
                  TRANS_BLOCK=''
              fi

              cat > /tmp/sing-box.json << JSONEOF
          {
            "log": {"level": "error"},
            "inbounds": [{"type": "tun", "tag": "tun-in", "interface_name": "tun0", "inet4_address": "172.19.0.1/30", "auto_route": true, "strict_route": true}],
            "outbounds": [
              {
                "type": "vless",
                "tag": "vless-out",
                "server": "$server",
                "server_port": $port,
                "uuid": "$uuid",
                $FLOW_BLOCK
                $TRANS_BLOCK
                "tls": {
                  "enabled": true,
                  "server_name": "$sni",
                  "utls": {"enabled": true, "fingerprint": "chrome"},
                  "reality": {"enabled": true, "public_key": "$pbk", "short_id": "$sid"}
                },
                "packet_encoding": "xudp"
              },
              {"type": "direct", "tag": "direct"}
            ],
            "route": {
              "rule_set": [
                {"tag": "geoip-ru", "type": "local", "format": "binary", "path": "/tmp/geo/geoip-ru.srs"},
                {"tag": "geosite-ru", "type": "local", "format": "binary", "path": "/tmp/geo/geosite-ru.srs"}
              ],
              "rules": [
                {"rule_set": ["geoip-ru", "geosite-ru"], "outbound": "direct"},
                {"domain_suffix": [".ru", ".su"], "outbound": "direct"}
              ],
              "auto_detect_interface": true
            }
          }
          JSONEOF

              procd_open_instance
              procd_set_param command /usr/bin/vpn-runner.sh
              procd_set_param respawn
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance
          }
          EOF
          
          sed -i 's/^[ \t]*JSONEOF/JSONEOF/' builder/files/etc/init.d/vless
          chmod +x builder/files/etc/init.d/vless

          cat << 'EOF' > builder/files/etc/uci-defaults/99-enable-vless
          #!/bin/sh
          /etc/init.d/vless enable
          rm -f /etc/uci-defaults/99-enable-vless
          EOF
          chmod +x builder/files/etc/uci-defaults/99-enable-vless

      - name: Build Firmware with OpenWrt 24.10.6 baseline
        run: |
          cd builder
          EXCLUDE_PKGS="-odhcp6c -kmod-ipv6 -luci-proto-ipv6 -kmod-usb-core -kmod-usb3 -ppp -ppp-mod-pppoe"
          INCLUDE_PKGS="luci luci-base luci-compat luci-theme-bootstrap wpad-basic-mbedtls ca-bundle curl"
          
          make image PROFILE="cudy_wr3000-v1" PACKAGES="$INCLUDE_PKGS $EXCLUDE_PKGS" FILES="files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cudy-WR3000-v1-OpenWrt-24.10.6-MicroVLESS
          path: builder/bin/targets/mediatek/filogic/*-sysupgrade.bin
