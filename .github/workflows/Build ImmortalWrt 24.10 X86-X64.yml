name: Build OpenWrt 24.10.6 — Cudy WR3000 v1 — Smart VLESS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build.yml']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Исходники репозитория ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Компиляция минимального sing-box для ARM64 ────────────────────
      #   Включаем только нужные протоколы: vless + xhttp + reality + utls
      #   Всё остальное (ss, trojan, hysteria, wg, ...) исключено → меньший бинарник
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build minimal sing-box (arm64)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zstd git

          git config --global url."https://github.com/".insteadOf "git@github.com:"
          # Используем официальный sing-box (не форк) — стабильнее и меньше весит
          git clone --depth=1 --branch v1.10.7 https://github.com/SagerNet/sing-box.git sing-box
          cd sing-box

          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm64
          # Только необходимые теги — экономим ~30% размера бинарника
          go build -v -trimpath \
            -ldflags "-s -w -buildid= -X github.com/sagernet/sing-box/constant.Version=1.10.7" \
            -tags "with_vless,with_utls,with_reality,with_xhttp" \
            -o ../sing-box ./cmd/sing-box
          cd ..

          ls -lh sing-box
          # Публикуем бинарник как release-ассет чтобы роутер мог его скачать в RAM
          # (16 МБ Flash не позволяет встроить Go-бинарник — он один займёт ~8 МБ из 13 МБ лимита)

      # ── 3. Публикуем бинарник как GitHub Release ─────────────────────────
      #   Роутер скачает его при первом старте в /tmp (256 МБ RAM, не Flash!)
      - name: Publish sing-box binary as GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete vpn-core --cleanup-tag -y 2>/dev/null || true
          gh release create vpn-core sing-box \
            --title "VPN Core (ARM64 sing-box v1.10.7)" \
            --notes "Автоматическая сборка. Скачивается роутером в RAM при старте."

      # ── 4. Скачиваем OpenWrt 24.10.6 Image Builder ───────────────────────
      - name: Download OpenWrt 24.10.6 Image Builder
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/openwrt-imagebuilder-24.10.6-mediatek-filogic.Linux-x86_64.tar.zst
          tar -xf openwrt-imagebuilder-24.10.6-mediatek-filogic.Linux-x86_64.tar.zst
          mv openwrt-imagebuilder-24.10.6-mediatek-filogic.Linux-x86_64 builder
          echo "=== Базовые пакеты ImageBuilder ==="
          cat builder/.config | grep -E "^CONFIG_TARGET" | head -20

      # ── 5. Максимальное сжатие SquashFS (XZ + большой блок) ──────────────
      - name: Enable maximum SquashFS compression
        run: |
          cd builder
          # Увеличиваем блок — лучше сжатие при незначительном росте RAM при монтировании
          sed -i 's/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=.*/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=1024/' .config || \
          echo "CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=1024" >> .config

      # ── 6. Создаём файловую систему прошивки ─────────────────────────────
      - name: Build firmware overlay files
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          mkdir -p builder/files/{usr/bin,etc/config,etc/init.d,etc/uci-defaults}
          mkdir -p builder/files/usr/lib/lua/luci/{controller,model/cbi}

          # ─────────────────────────────────────────────────────────────────
          # UCI-конфиг VPN (хранит настройки, включая подписку)
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/etc/config/vpn << 'CFGEOF'
config vpn 'settings'
    option enabled '0'
    option mode 'manual'
    option subscription_url ''

config server 'main'
    option alias 'Мой сервер'
    option server ''
    option port '443'
    option uuid ''
    option transport 'xhttp'
    option sni ''
    option pbk ''
    option sid ''
    option active '1'
CFGEOF

          # ─────────────────────────────────────────────────────────────────
          # LuCI-контроллер
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/usr/lib/lua/luci/controller/vpn.lua << 'EOF'
module("luci.controller.vpn", package.seeall)
function index()
    entry({"admin", "vpn"}, firstchild(), "VPN", 60).dependent = false
    entry({"admin", "vpn", "settings"}, cbi("vpn/settings"), "Настройки", 1)
    entry({"admin", "vpn", "servers"}, cbi("vpn/servers"), "Серверы", 2)
    entry({"admin", "vpn", "status"}, call("action_status"), "Статус", 3)
end

function action_status()
    local running = (os.execute("pgrep -x sing-box >/dev/null 2>&1") == 0)
    luci.template.render("vpn/status", {running = running})
end
EOF

          # ─────────────────────────────────────────────────────────────────
          # LuCI CBI — основные настройки
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/usr/lib/lua/luci/model/cbi/vpn/settings.lua << 'EOF'
m = Map("vpn", "VPN — Настройки")

m.on_after_commit = function()
    os.execute("/etc/init.d/vpn restart >/dev/null 2>&1 &")
end

s = m:section(NamedSection, "settings", "vpn", "Управление")
s:option(Flag, "enabled", "Включить VPN")

sub = s:option(Value, "subscription_url", "URL подписки VLESS")
sub.placeholder = "vless://..."
sub.description = "Вставьте ссылку-подписку или одиночный vless:// ключ"

return m
EOF

          # ─────────────────────────────────────────────────────────────────
          # LuCI CBI — список серверов (ручное добавление)
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/usr/lib/lua/luci/model/cbi/vpn/servers.lua << 'EOF'
m = Map("vpn", "VPN — Серверы")

m.on_after_commit = function()
    os.execute("/etc/init.d/vpn restart >/dev/null 2>&1 &")
end

s = m:section(TypedSection, "server", "Серверы VLESS")
s.addremove = true
s.anonymous = false
s.template  = "cbi/tblsection"

s:option(Value,    "alias",    "Название")
s:option(Flag,     "active",   "Активен")
s:option(Value,    "server",   "Сервер")
s:option(Value,    "port",     "Порт")
s:option(Value,    "uuid",     "UUID")

t = s:option(ListValue, "transport", "Транспорт")
t:value("xhttp", "XHTTP / Split-HTTP")
t:value("tcp",   "TCP + XTLS-Vision")
t.default = "xhttp"

s:option(Value, "sni", "SNI")
s:option(Value, "pbk", "Public Key")
s:option(Value, "sid", "Short ID")

return m
EOF

          # ─────────────────────────────────────────────────────────────────
          # Шаблон статуса
          # ─────────────────────────────────────────────────────────────────
          mkdir -p builder/files/usr/lib/lua/luci/view/vpn
          cat > builder/files/usr/lib/lua/luci/view/vpn/status.htm << 'EOF'
<%+header%>
<h2>VPN — Статус</h2>
<% if running then %>
<p style="color:green;font-weight:bold">✓ Туннель активен</p>
<% else %>
<p style="color:gray">○ Туннель не запущен</p>
<% end %>
<p><a href="<%=luci.dispatcher.build_url("admin","vpn","settings")%>">← Настройки</a></p>
<%+footer%>
EOF

          # ─────────────────────────────────────────────────────────────────
          # Скрипт разбора VLESS-ключа
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/usr/bin/vless-parse.sh << 'PARSEEOF'
#!/bin/sh
# Разбирает vless://UUID@host:port?params#name
# Использование: vless-parse.sh "vless://..."
# Выводит: server port uuid transport sni pbk sid
KEY="$1"
[ -z "$KEY" ] && exit 1

# Убираем схему и фрагмент
BODY="${KEY#vless://}"
ALIAS="${BODY##*#}"
BODY="${BODY%%#*}"

UUID="${BODY%%@*}"
HOSTPORT="${BODY#*@}"
HOSTPORT="${HOSTPORT%%\?*}"
PARAMS="${BODY#*\?}"
[ "$PARAMS" = "$BODY" ] && PARAMS=""

SERVER="${HOSTPORT%%:*}"
PORT="${HOSTPORT##*:}"

urldecode() {
    printf '%b' "$(echo "$1" | sed 's/+/ /g; s/%\(..\)/\\x\1/g')"
}

get_param() {
    echo "$PARAMS" | tr '&' '\n' | grep "^${1}=" | head -1 | cut -d= -f2-
}

TRANSPORT=$(get_param "type")
[ -z "$TRANSPORT" ] && TRANSPORT="tcp"
SNI=$(urldecode "$(get_param "sni")")
[ -z "$SNI" ] && SNI=$(get_param "peer")
PBK=$(get_param "pbk")
SID=$(get_param "sid")
FP=$(get_param "fp")

echo "server=$SERVER"
echo "port=$PORT"
echo "uuid=$UUID"
echo "transport=$TRANSPORT"
echo "sni=$SNI"
echo "pbk=$PBK"
echo "sid=$SID"
echo "alias=${ALIAS:-$SERVER}"
PARSEEOF
          chmod +x builder/files/usr/bin/vless-parse.sh

          # ─────────────────────────────────────────────────────────────────
          # Обновление серверов из подписки
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/usr/bin/vpn-subscription.sh << 'SUBEOF'
#!/bin/sh
# Скачивает подписку и обновляет UCI-конфиг серверов
. /lib/functions.sh

SUB_URL=$(uci get vpn.settings.subscription_url 2>/dev/null)
[ -z "$SUB_URL" ] && exit 0

logger -t "VPN" "Updating subscription from $SUB_URL"

TMPFILE=$(mktemp)
if ! curl -sfL --connect-timeout 15 --max-time 30 -o "$TMPFILE" "$SUB_URL"; then
    logger -t "VPN" "Subscription download failed"
    rm -f "$TMPFILE"
    exit 1
fi

CONTENT=$(cat "$TMPFILE")
rm -f "$TMPFILE"

# Поддержка: одиночный vless:// ключ или base64-список
if echo "$CONTENT" | grep -q "^vless://"; then
    KEYS="$CONTENT"
else
    KEYS=$(echo "$CONTENT" | base64 -d 2>/dev/null | grep "^vless://")
fi

[ -z "$KEYS" ] && logger -t "VPN" "No vless:// keys found in subscription" && exit 1

# Удаляем старые серверы кроме 'main' (он может быть добавлен вручную)
for sec in $(uci show vpn | grep "=server" | cut -d. -f2 | cut -d= -f1); do
    [ "$sec" = "main" ] || uci delete "vpn.$sec"
done

IDX=0
echo "$KEYS" | while IFS= read -r KEY; do
    KEY=$(echo "$KEY" | tr -d '\r\n ')
    [ -z "$KEY" ] && continue
    IDX=$((IDX+1))
    SECNAME="sub_$IDX"
    eval $(vless-parse.sh "$KEY")
    uci set "vpn.$SECNAME=server"
    uci set "vpn.$SECNAME.alias=${alias:-server $IDX}"
    uci set "vpn.$SECNAME.server=$server"
    uci set "vpn.$SECNAME.port=${port:-443}"
    uci set "vpn.$SECNAME.uuid=$uuid"
    uci set "vpn.$SECNAME.transport=${transport:-xhttp}"
    uci set "vpn.$SECNAME.sni=$sni"
    uci set "vpn.$SECNAME.pbk=$pbk"
    uci set "vpn.$SECNAME.sid=$sid"
    uci set "vpn.$SECNAME.active=0"
    # Первый сервер делаем активным
    [ "$IDX" = "1" ] && uci set "vpn.$SECNAME.active=1"
done

uci commit vpn
logger -t "VPN" "Subscription updated: $IDX servers imported"
SUBEOF
          chmod +x builder/files/usr/bin/vpn-subscription.sh

          # ─────────────────────────────────────────────────────────────────
          # Основной runner: скачивает GeoIP в RAM, строит JSON, запускает sing-box
          # Бинарник sing-box скачивается в RAM (~256 МБ доступно) — единственный
          # способ при лимите Flash 16 МБ (Go-бинарник один занял бы ~8 МБ из 13 МБ)
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/usr/bin/vpn-runner.sh << RUNEOF
#!/bin/sh
REPO="${GITHUB_REPO}"
SBOX=/tmp/sing-box
SBOX_URL="https://github.com/\${REPO}/releases/download/vpn-core/sing-box"
GEOIP_URL="https://github.com/savely-krasovsky/ru-routing/releases/latest/download/geoip.srs"
GEOSITE_URL="https://github.com/savely-krasovsky/ru-routing/releases/latest/download/geosite.srs"

log() { logger -t "VPN" "\$1"; }

dl() {
    local FILE=\$1 URL=\$2
    log "Downloading \$FILE..."
    curl -sfL -4 --connect-timeout 20 --retry 3 --retry-delay 5 -o "\$FILE" "\$URL" && return 0
    curl -sfL -4 --connect-timeout 20 --retry 2 -o "\$FILE" "https://mirror.ghproxy.com/\$URL" && return 0
    curl -sfL -4 --connect-timeout 15 --retry 2 -o "\$FILE" "https://ghp.ci/\$URL"
}

wait_net() {
    local TRIES=0
    log "Waiting for internet..."
    while ! ping -c1 -W2 8.8.8.8 >/dev/null 2>&1 && ! ping -c1 -W2 1.1.1.1 >/dev/null 2>&1; do
        TRIES=\$((TRIES+1))
        [ "\$TRIES" -ge 40 ] && log "No internet after 120s" && return 1
        sleep 3
    done
    return 0
}

build_config() {
    . /lib/functions.sh
    config_load vpn

    # Ищем активный сервер
    local FOUND=0
    config_foreach find_active_server server
    [ "\$FOUND" = "0" ] && log "No active server configured" && return 1
}

find_active_server() {
    local sec="\$1"
    local active; config_get active "\$sec" active "0"
    [ "\$active" != "1" ] && return

    local server port uuid transport sni pbk sid
    config_get server    "\$sec" server
    config_get port      "\$sec" port 443
    config_get uuid      "\$sec" uuid
    config_get transport "\$sec" transport xhttp
    config_get sni       "\$sec" sni
    config_get pbk       "\$sec" pbk
    config_get sid       "\$sec" sid

    [ -z "\$server" ] || [ -z "\$uuid" ] && return

    local FLOW_BLOCK TRANS_BLOCK
    if [ "\$transport" = "xhttp" ]; then
        FLOW_BLOCK=""
        TRANS_BLOCK='"transport": {"type": "xhttp", "method": "GET"},'
    else
        FLOW_BLOCK='"flow": "xtls-rprx-vision",'
        TRANS_BLOCK=""
    fi

    cat > /tmp/sing-box.json << JEOF
{
  "log": {"level": "warn"},
  "dns": {
    "servers": [
      {"tag": "remote", "address": "https://1.1.1.1/dns-query", "detour": "vless-out"},
      {"tag": "local",  "address": "223.5.5.5", "detour": "direct"}
    ],
    "rules": [
      {"rule_set": ["geosite-ru"], "server": "local"},
      {"domain_suffix": [".ru", ".su", ".рф"], "server": "local"}
    ],
    "final": "remote"
  },
  "inbounds": [
    {
      "type": "tun",
      "tag": "tun-in",
      "interface_name": "tun0",
      "inet4_address": "172.19.0.1/30",
      "auto_route": true,
      "strict_route": false,
      "sniff": true
    }
  ],
  "outbounds": [
    {
      "type": "vless",
      "tag": "vless-out",
      "server": "\$server",
      "server_port": \$port,
      "uuid": "\$uuid",
      \$FLOW_BLOCK
      \$TRANS_BLOCK
      "tls": {
        "enabled": true,
        "server_name": "\$sni",
        "utls": {"enabled": true, "fingerprint": "chrome"},
        "reality": {"enabled": true, "public_key": "\$pbk", "short_id": "\$sid"}
      },
      "packet_encoding": "xudp"
    },
    {"type": "direct", "tag": "direct"},
    {"type": "block",  "tag": "block"}
  ],
  "route": {
    "rule_set": [
      {"tag": "geoip-ru",   "type": "local", "format": "binary", "path": "/tmp/geo/geoip-ru.srs"},
      {"tag": "geosite-ru", "type": "local", "format": "binary", "path": "/tmp/geo/geosite-ru.srs"}
    ],
    "rules": [
      {"inbound": ["tun-in"], "action": "sniff"},
      {"protocol": "dns", "action": "hijack-dns"},
      {"rule_set": ["geoip-ru", "geosite-ru"], "outbound": "direct"},
      {"domain_suffix": [".ru", ".su", ".рф"], "outbound": "direct"},
      {"ip_is_private": true, "outbound": "direct"}
    ],
    "final": "vless-out",
    "auto_detect_interface": true
  }
}
JEOF
    FOUND=1
}

# ── MAIN ────────────────────────────────────────────────────────────────────

mkdir -p /tmp/geo

# Ждём интернета
wait_net || exit 1
log "Internet OK"

# Скачиваем sing-box если нет или устарел
if [ ! -x "\$SBOX" ]; then
    log "Downloading sing-box binary..."
    dl "\$SBOX" "\$SBOX_URL"
    chmod +x "\$SBOX" 2>/dev/null
fi
if [ ! -x "\$SBOX" ]; then
    log "ERROR: Failed to download sing-box"
    exit 1
fi

# Скачиваем GeoIP базы в RAM (не Flash) — базы весят 2-3 МБ, Flash не тратится
ATTEMPT=0
while [ \$ATTEMPT -lt 5 ]; do
    ATTEMPT=\$((ATTEMPT+1))
    [ -s /tmp/geo/geoip-ru.srs ]   || dl "/tmp/geo/geoip-ru.srs"   "\$GEOIP_URL"
    [ -s /tmp/geo/geosite-ru.srs ] || dl "/tmp/geo/geosite-ru.srs" "\$GEOSITE_URL"
    [ -s /tmp/geo/geoip-ru.srs ] && [ -s /tmp/geo/geosite-ru.srs ] && break
    log "GeoIP attempt \$ATTEMPT/5 failed, retry in 15s..."
    rm -f /tmp/geo/geoip-ru.srs /tmp/geo/geosite-ru.srs
    sleep 15
done

if [ ! -s /tmp/geo/geoip-ru.srs ] || [ ! -s /tmp/geo/geosite-ru.srs ]; then
    log "ERROR: GeoIP download failed — starting without routing rules (all traffic via VPN)"
    # Запускаем без GeoIP — все через VPN, .ru напрямую по домену
    cat > /tmp/sing-box.json << NGEOJEOF
{
  "log": {"level": "warn"},
  "inbounds": [{"type": "tun", "tag": "tun-in", "interface_name": "tun0", "inet4_address": "172.19.0.1/30", "auto_route": true, "strict_route": false, "sniff": true}],
  "outbounds": [
    OUTBOUND_PLACEHOLDER,
    {"type": "direct", "tag": "direct"}
  ],
  "route": {
    "rules": [
      {"domain_suffix": [".ru", ".su", ".рф"], "outbound": "direct"},
      {"ip_is_private": true, "outbound": "direct"}
    ],
    "final": "vless-out",
    "auto_detect_interface": true
  }
}
NGEOJEOF
fi

# Строим конфиг (перезаписывает если GeoIP есть)
find_active_server() {
    local sec="\$1"
    local active; config_get active "\$sec" active "0"
    [ "\$active" != "1" ] && return
    local server port uuid transport sni pbk sid
    config_get server    "\$sec" server
    config_get port      "\$sec" port 443
    config_get uuid      "\$sec" uuid
    config_get transport "\$sec" transport xhttp
    config_get sni       "\$sec" sni
    config_get pbk       "\$sec" pbk
    config_get sid       "\$sec" sid
    [ -z "\$server" ] || [ -z "\$uuid" ] && return
    local FLOW TRANS
    if [ "\$transport" = "xhttp" ]; then
        FLOW=""; TRANS='"transport": {"type": "xhttp", "method": "GET"},'
    else
        FLOW='"flow": "xtls-rprx-vision",'; TRANS=""
    fi
    cat > /tmp/sing-box.json << CFG
{
  "log": {"level": "warn"},
  "dns": {
    "servers": [
      {"tag": "remote", "address": "https://1.1.1.1/dns-query", "detour": "vless-out"},
      {"tag": "local",  "address": "223.5.5.5", "detour": "direct"}
    ],
    "rules": [
      {"rule_set": ["geosite-ru"], "server": "local"},
      {"domain_suffix": [".ru", ".su", ".рф"], "server": "local"}
    ],
    "final": "remote"
  },
  "inbounds": [{"type": "tun", "tag": "tun-in", "interface_name": "tun0", "inet4_address": "172.19.0.1/30", "auto_route": true, "strict_route": false, "sniff": true}],
  "outbounds": [
    {
      "type": "vless", "tag": "vless-out",
      "server": "\$server", "server_port": \$port, "uuid": "\$uuid",
      \$FLOW \$TRANS
      "tls": {"enabled": true, "server_name": "\$sni", "utls": {"enabled": true, "fingerprint": "chrome"}, "reality": {"enabled": true, "public_key": "\$pbk", "short_id": "\$sid"}},
      "packet_encoding": "xudp"
    },
    {"type": "direct", "tag": "direct"}
  ],
  "route": {
    "rule_set": [
      {"tag": "geoip-ru",   "type": "local", "format": "binary", "path": "/tmp/geo/geoip-ru.srs"},
      {"tag": "geosite-ru", "type": "local", "format": "binary", "path": "/tmp/geo/geosite-ru.srs"}
    ],
    "rules": [
      {"protocol": "dns", "action": "hijack-dns"},
      {"rule_set": ["geoip-ru", "geosite-ru"], "outbound": "direct"},
      {"domain_suffix": [".ru", ".su", ".рф"], "outbound": "direct"},
      {"ip_is_private": true, "outbound": "direct"}
    ],
    "final": "vless-out",
    "auto_detect_interface": true
  }
}
CFG
    FOUND=1
}

. /lib/functions.sh
config_load vpn
FOUND=0
config_foreach find_active_server server

if [ "\$FOUND" = "0" ]; then
    log "No active server configured — VPN not started"
    exit 0
fi

log "Starting sing-box tunnel..."
exec "\$SBOX" run -c /tmp/sing-box.json
RUNEOF
          chmod +x builder/files/usr/bin/vpn-runner.sh

          # ─────────────────────────────────────────────────────────────────
          # init.d-скрипт с fallback: если VPN упал — трафик идёт напрямую
          # (strict_route=false в конфиге sing-box обеспечивает это автоматически)
          # ─────────────────────────────────────────────────────────────────
          cat > builder/files/etc/init.d/vpn << 'INITEOF'
#!/bin/sh /etc/rc.common
START=99
STOP=10
USE_PROCD=1
PROG=/usr/bin/vpn-runner.sh

start_service() {
    local enabled
    config_load vpn
    config_get enabled settings enabled 0
    [ "$enabled" = "1" ] || { logger -t "VPN" "Disabled in config"; return 0; }

    # Обновляем подписку в фоне перед стартом
    local sub_url
    config_get sub_url settings subscription_url ""
    [ -n "$sub_url" ] && {
        vpn-subscription.sh &
        # Небольшая задержка чтобы UCI обновился до запуска runner
        sleep 2
    }

    procd_open_instance
    procd_set_param command "$PROG"
    procd_set_param respawn 60 5 3
    procd_set_param stdout 1
    procd_set_param stderr 1
    procd_close_instance
}

stop_service() {
    killall sing-box 2>/dev/null
    ip link delete tun0 2>/dev/null
    rm -f /tmp/sing-box.json /tmp/geo/geoip-ru.srs /tmp/geo/geosite-ru.srs
}

reload_service() {
    stop_service
    sleep 1
    start_service
}
