name: Build Ultra-Compact Cudy WR3000 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build custom minimal Sing-box and compress with UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          
          git clone https://github.com/SagerNet/sing-box.git
          cd sing-box
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm64
          go build -v -trimpath -ldflags "-s -w -buildid=" \
            -tags "with_vless,with_utls,with_reality,with_clash_api" \
            -o ../sing-box-custom ./cmd/sing-box
          cd ..
          
          upx --best --lzma sing-box-custom

      - name: Setup ImmortalWrt ImageBuilder (MT7981)
        run: |
          wget https://downloads.immortalwrt.org/releases/23.05.4/targets/mediatek/filogic/immortalwrt-imagebuilder-23.05.4-mediatek-filogic.Linux-x86_64.tar.xz
          tar -xf immortalwrt-imagebuilder-*.tar.xz
          mv immortalwrt-imagebuilder-*/ builder

      - name: Patch SquashFS compression in .config
        run: |
          cd builder
          sed -i 's/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256/CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=1024/g' .config
          sed -i 's/CONFIG_TARGET_IMAGES_GZIP=y/# CONFIG_TARGET_IMAGES_GZIP is not set/g' .config

      - name: Inject files and deploy MKSQUASHFS Interceptor
        run: |
          mkdir -p builder/files/usr/bin/
          mkdir -p builder/files/etc/init.d/
          mkdir -p builder/files/etc/uci-defaults/
          
          cp sing-box-custom builder/files/usr/bin/sing-box
          chmod +x builder/files/usr/bin/sing-box

          cat << 'EOF' > builder/files/etc/init.d/geo-ram-loader
          #!/bin/sh /etc/rc.common
          START=99
          start() {
            mkdir -p /tmp/geo
            logger -t "GeoRAM" "Downloading RU routing rules to RAM..."
            wget -qO /tmp/geo/geoip-ru.srs https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip-ru.srs
            wget -qO /tmp/geo/geosite-ru.srs https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite-ru.srs
            /etc/init.d/homeproxy restart
          }
          EOF
          chmod +x builder/files/etc/init.d/geo-ram-loader

          cat << 'EOF' > builder/files/etc/uci-defaults/99-enable-geo-ram
          #!/bin/sh
          /etc/init.d/geo-ram-loader enable
          /etc/init.d/geo-ram-loader start
          rm -f /etc/uci-defaults/99-enable-geo-ram
          EOF
          chmod +x builder/files/etc/uci-defaults/99-enable-geo-ram

          # === ПЕРЕХВАТЧИК MKSQUASHFS ===
          MKSQ_PATH=$(find builder -name mksquashfs4 | head -n 1)
          mv "$MKSQ_PATH" "${MKSQ_PATH}_real"
          
          cat << 'EOF' > "$MKSQ_PATH"
          #!/bin/bash
          TARGET_DIR=$1
          
          echo "=== РАДИКАЛЬНАЯ ЗАЧИСТКА ЯДРА И БАЗЫ ОС ==="
          
          # 1. Полное удаление пакетного менеджера OPKG
          rm -rf "$TARGET_DIR"/usr/lib/opkg
          rm -rf "$TARGET_DIR"/etc/opkg.conf
          rm -f "$TARGET_DIR"/sbin/opkg "$TARGET_DIR"/usr/bin/opkg
          
          # 2. Физическое удаление модулей ядра (USB, IPv6, Файловые системы накопителей)
          find "$TARGET_DIR"/lib/modules -name "*usb*" -delete
          find "$TARGET_DIR"/lib/modules -name "*ip6t*" -delete
          find "$TARGET_DIR"/lib/modules -name "*ipv6*" -delete
          find "$TARGET_DIR"/lib/modules -name "ext4.ko" -delete
          find "$TARGET_DIR"/lib/modules -name "fat.ko" -delete
          find "$TARGET_DIR"/lib/modules -name "vfat.ko" -delete
          find "$TARGET_DIR"/lib/modules -name "ntfs*.ko" -delete
          find "$TARGET_DIR"/lib/modules -name "nls_*.ko" -delete
          
          # 3. Очистка тяжелых тем и файлов перевода интерфейса (оставляем только английский)
          rm -rf "$TARGET_DIR"/www/luci-static/argon 2>/dev/null
          rm -rf "$TARGET_DIR"/www/luci-static/design 2>/dev/null
          rm -rf "$TARGET_DIR"/usr/lib/lua/luci/i18n/* 2>/dev/null
          
          # 4. Удаление статических баз гео-роутинга
          rm -rf "$TARGET_DIR"/usr/share/v2ray/* 2>/dev/null
          rm -rf "$TARGET_DIR"/usr/share/sing-box/* 2>/dev/null
          rm -rf "$TARGET_DIR"/usr/share/xray/* 2>/dev/null
          rm -rf "$TARGET_DIR"/etc/homeproxy/resources/* 2>/dev/null
          mkdir -p "$TARGET_DIR"/usr/share/sing-box
          touch "$TARGET_DIR"/usr/share/sing-box/geoip.srs
          touch "$TARGET_DIR"/usr/share/sing-box/geosite.srs
          
          exec "${0}_real" "$@"
          EOF
          chmod +x "$MKSQ_PATH"

      - name: Build Firmware with base OS reduction
        run: |
          cd builder
          # Максимально расширенный список исключений пакетов
          EXCLUDE_PKGS="-block-mount -blkid -kmod-fs-ext4 -kmod-fs-vfat -kmod-fs-exfat -kmod-usb-core -kmod-usb3 -kmod-usb2 -kmod-usb-net -kmod-usb-storage -kmod-usb-storage-extras -kmod-scsi-core -luci-proto-ipv6 -ipv6helper -odhcp6c -kmod-ipv6 -kmod-ip6tables -ip6tables -kmod-nf-ipt6 -kmod-nf-conntrack6 -ppp -ppp-mod-pppoe -kmod-ppp -kmod-pppoe -kmod-pppox -kmod-slhc -wpad-openssl -wpad-basic-openssl -luci-i18n-base-zh-cn -luci-i18n-homeproxy-zh-cn -luci-theme-argon -luci-app-ttyd -ttyd -luci-app-upnp -miniupnpd -luci-app-samba4 -samba4-server -luci-app-filetransfer -luci-app-ramfree -luci-app-autoreboot -automount -tcpdump -htop -coremark -kmod-sound-core -kmod-usb-dwc3 -luci-app-nlbwmon -nlbwmon -luci-app-zerotier -zerotier -luci-app-sqm -sqm-scripts -luci-app-bbr -kmod-tcp-bbr -luci-app-ddns -ddns-scripts -luci-app-wol -etherwake"
          
          INCLUDE_PKGS="luci-app-homeproxy luci-theme-bootstrap wpad-basic-mbedtls"
          
          make image PROFILE="cudy_wr3000-v1" PACKAGES="$INCLUDE_PKGS $EXCLUDE_PKGS" FILES="files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cudy-WR3000-v1-UltraCompact
          path: builder/bin/targets/mediatek/filogic/*-sysupgrade.bin
