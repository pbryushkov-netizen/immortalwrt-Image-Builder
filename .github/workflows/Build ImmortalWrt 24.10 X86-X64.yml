      # Профиль: cudy_wr3000-v1 (MediaTek MT7981, ARM64)
      #
      # ВКЛЮЧАЕМ (минимум для работы):
      #   luci + luci-compat + luci-theme-bootstrap — веб-интерфейс
      #   wpad-basic-mbedtls  — Wi-Fi
      #   ca-bundle curl      — HTTPS для скачивания GeoIP и бинарника
      #   kmod-tun            — TUN устройство для sing-box
      #   ip-full             — ip route/rule для маршрутизации
      #
      # ИСКЛЮЧАЕМ (уменьшаем размер):
      #   IPv6-стек, USB, PPP, лишние LuCI-протоколы, luci-app-firewall
      - name: Build firmware (OpenWrt 24.10.6, cudy_wr3000-v1)
        run: |
          cd builder

          INCLUDE="luci luci-base luci-compat luci-theme-bootstrap \
                   wpad-basic-mbedtls ca-bundle curl \
                   kmod-tun ip-full \
                   kmod-nft-core nftables"

          EXCLUDE="-odhcp6c -odhcpd-ipv6only \
                   -kmod-ipv6 -kmod-ip6tables -ip6tables \
                   -luci-proto-ipv6 -luci-proto-ppp \
                   -kmod-usb-core -kmod-usb3 \
                   -ppp -ppp-mod-pppoe \
                   -luci-app-firewall \
                   -luci-app-opkg"

          make image \
            PROFILE="cudy_wr3000-v1" \
            PACKAGES="$INCLUDE $EXCLUDE" \
            FILES="files" \
            EXTRA_IMAGE_NAME="vless" 2>&1 | tail -50

          echo "=== Готовые файлы прошивки ==="
          ls -lh bin/targets/mediatek/filogic/ | grep -E "\.bin|\.img"

